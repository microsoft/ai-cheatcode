<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 300px;
    min-height: 300px;
    background: #1B1B3A;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Purple accent bar at top */
  .accent-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #6B2FA0 0%, #9B59B6 50%, #6B2FA0 100%);
  }

  /* Subtle grid pattern overlay */
  .grid-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      linear-gradient(rgba(107, 47, 160, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(107, 47, 160, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Decorative glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
  }
  .orb-1 {
    width: 300px;
    height: 300px;
    background: rgba(107, 47, 160, 0.15);
    top: -100px;
    left: -50px;
  }
  .orb-2 {
    width: 200px;
    height: 200px;
    background: rgba(0, 120, 212, 0.10);
    bottom: -80px;
    right: 100px;
  }
  .orb-3 {
    width: 250px;
    height: 250px;
    background: rgba(107, 47, 160, 0.08);
    top: -60px;
    right: -40px;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 0 60px;
  }

  .title {
    font-size: 52px;
    font-weight: 700;
    color: #FFFFFF;
    letter-spacing: 1px;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 10px;
  }

  .tagline {
    font-size: 18px;
    color: #B8A9C9;
    letter-spacing: 0.5px;
    text-align: center;
    margin-bottom: 18px;
    font-weight: 400;
  }

  .konami {
    font-family: Consolas, 'Courier New', monospace;
    font-size: 12px;
    color: #6B2FA0;
    letter-spacing: 5px;
    text-align: center;
  }

  /* Decorative bracket accents */
  .bracket-left, .bracket-right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 120px;
    color: rgba(107, 47, 160, 0.12);
    font-weight: 100;
    line-height: 1;
    font-family: 'Segoe UI', sans-serif;
  }
  .bracket-left {
    left: 30px;
  }
  .bracket-right {
    right: 30px;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="bracket-left">{</div>
  <div class="bracket-right">}</div>

  <div class="content">
    <div class="title">The Cheat Code</div>
    <div class="tagline">Agent Patterns for Copilot Chat</div>
    <div class="konami">▲ ▲ ▼ ▼ ◄ ► ◄ ► B A START</div>
  </div>
</body>
</html>
