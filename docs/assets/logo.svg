<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Cheat Code — Concept 3: Prompt Caret Cartridge.
  Retro NES-style cartridge silhouette: rounded body with notched shoulders
  on top, label window showing a blinking > terminal caret.
  Old cheat code meets new prompt.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Cheat Code">
  <defs>
    <linearGradient id="cart-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#252548"/>
      <stop offset="100%" stop-color="#0E0E1F"/>
    </linearGradient>
    <linearGradient id="cart-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B2FA0"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
  </defs>
  <!--
    Cartridge silhouette: two shoulder notches at top creating a stepped
    profile, then rounded body. The shoulders echo the Bento grid corner.
  -->
  <path
    d="M8 8
       H20
       V14
       H44
       V8
       H56
       a4 4 0 0 1 4 4
       V54
       a4 4 0 0 1 -4 4
       H8
       a4 4 0 0 1 -4 -4
       V12
       a4 4 0 0 1 4 -4 Z"
    fill="url(#cart-body)"
    stroke="url(#cart-edge)"
    stroke-width="2"/>
  <!-- Label window -->
  <rect x="10" y="22" width="44" height="28" rx="4" ry="4"
        fill="#1B1B3A" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <!-- Terminal prompt: > caret + blinking block -->
  <g font-family="'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace"
     font-weight="700" fill="#ffffff">
    <text x="16" y="36" font-size="14" dominant-baseline="central" fill="#C9A8E8">&gt;</text>
    <rect x="27" y="31" width="8" height="10" fill="#ffffff">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
