<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Cheat Code — primary logo mark.
  2×2 Konami glyph grid (↑ ↓ / A B) on purple→blue gradient.
  Scales cleanly from 32px to hero sizes. For favicons use logo-favicon.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Cheat Code">
  <defs>
    <linearGradient id="cc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B2FA0"/>
      <stop offset="55%" stop-color="#8E4FC2"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <filter id="cc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#cc-grad)"/>
  <g fill="#ffffff" font-family="'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="600" text-anchor="middle" dominant-baseline="central">
    <text x="20" y="22" font-size="18">↑</text>
    <text x="44" y="22" font-size="18">↓</text>
    <text x="20" y="45" font-size="16">A</text>
    <text x="44" y="45" font-size="16">B</text>
  </g>
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" ry="13.5" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
</svg>
