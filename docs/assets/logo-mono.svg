<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Cheat Code — monochrome logo mark (for light backgrounds or reversed contexts).
  Uses currentColor so it inherits from parent text color.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Cheat Code" fill="currentColor">
  <rect x="1" y="1" width="62" height="62" rx="13" ry="13" fill="none" stroke="currentColor" stroke-width="2"/>
  <g font-family="'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace" font-weight="600" text-anchor="middle" dominant-baseline="central">
    <text x="20" y="22" font-size="18">↑</text>
    <text x="44" y="22" font-size="18">↓</text>
    <text x="20" y="45" font-size="16">A</text>
    <text x="44" y="45" font-size="16">B</text>
  </g>
</svg>
