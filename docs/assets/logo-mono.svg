<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Cheat Code — monochrome logo (cartridge silhouette, currentColor stroke).
  Use on light grounds or wherever a reversed/mono treatment is needed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Cheat Code" fill="currentColor">
  <path
    d="M8 8
       H20
       V14
       H44
       V8
       H56
       a4 4 0 0 1 4 4
       V54
       a4 4 0 0 1 -4 4
       H8
       a4 4 0 0 1 -4 -4
       V12
       a4 4 0 0 1 4 -4 Z"
    fill="none"
    stroke="currentColor"
    stroke-width="2"/>
  <rect x="10" y="22" width="44" height="28" rx="4" ry="4"
        fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <text x="32" y="36" text-anchor="middle" dominant-baseline="central"
        font-family="'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace"
        font-weight="700" font-size="14">&gt;_</text>
</svg>
