    stroke="url(#cart-fav-edge)"
    stroke-width="3"/>
  <text x="32" y="38" text-anchor="middle" dominant-baseline="central"
        font-family="'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace"
        font-weight="700" font-size="26" fill="#ffffff">&gt;_</text>
</svg>
