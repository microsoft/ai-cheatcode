<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Cheat Code — Concept 3 favicon variant (static, no blink).
  Simpler shoulders and larger prompt for 16–48px legibility.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Cheat Code">
  <defs>
    <linearGradient id="cart-fav-edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B2FA0"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
  </defs>
  <path
    d="M6 6
       H22
       V12
       H42
       V6
       H58
       a4 4 0 0 1 4 4
       V56
       a4 4 0 0 1 -4 4
       H6
       a4 4 0 0 1 -4 -4
       V10
       a4 4 0 0 1 4 -4 Z"
